<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>David Saunders — Design Portfolio</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      margin: 0;
      padding: 0;
      background: #1a1a1a;
      color: white;
    }
    header {
      padding: 20px 24px;
      text-align: center;
      border-bottom: 1px solid #333;
    }
    header h1 {
      margin: 0;
      font-size: 16px;
      font-weight: 500;
      letter-spacing: 0.02em;
    }
    header p {
      margin: 6px 0 0;
      font-size: 13px;
      color: #888;
    }
    header a {
      color: #aaa;
      text-decoration: none;
      border-bottom: 1px solid #555;
    }
    header a:hover {
      color: #fff;
      border-bottom-color: #fff;
    }
    .pdf-container {
      width: 100%;
      height: calc(100vh - 80px);
    }
    .pdf-container iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>
  <header>
    <h1>David Saunders — Design Portfolio</h1>
    <p><a href="David_Saunders_Design_Portfolio.pdf" download>Download PDF</a></p>
  </header>
  <div class="pdf-container">
    <iframe src="David_Saunders_Design_Portfolio.pdf"></iframe>
  </div>
</body>
</html>
